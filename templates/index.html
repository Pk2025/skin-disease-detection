<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Disease Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; }
    </style>
    <meta name="theme-color" content="#0b1020">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="logo">🩺</div>
                <div>
                    <h1>Skin Disease Detection</h1>
                    <div class="muted">Classify conditions from a photo in seconds</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <form id="upload-form" enctype="multipart/form-data">
                    <div id="dropzone" class="uploader" tabindex="0" role="button" aria-label="Upload image by clicking or dragging">
                        <input type="file" id="image" name="image" accept="image/*" required>
                        <div>
                            <div><strong>Drop an image</strong> or click to browse</div>
                            <div class="hint">PNG, JPG up to ~5MB</div>
                        </div>
                    </div>

                    <div class="preview hidden" id="preview">
                        <img id="preview-img" alt="Selected preview" />
                        <div>
                            <div class="pill"><span id="file-name">image.jpg</span></div>
                            <div class="actions">
                                <select name="model_type" id="model_type">
                                    <option value="vgg16">VGG16 (Keras)</option>
                                    <option value="resnet50">ResNet50 (PyTorch)</option>
                                </select>
                                <button id="submit-btn" type="submit">
                                    <span id="btn-text">Predict Disease</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card result-card">
                <h3 class="muted" style="margin-top:0">Result</h3>
                <div id="result" class="muted">No prediction yet. Upload an image to begin.</div>
            </div>
        </div>

        <div class="footer">This tool does not replace professional medical advice.</div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const imageInput = document.getElementById('image');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        const fileName = document.getElementById('file-name');
        const resultBox = document.getElementById('result');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');

        const setLoading = (isLoading) => {
            if (isLoading) {
                btnText.innerHTML = '<span class="spinner" aria-hidden="true"></span>';
                submitBtn.disabled = true;
            } else {
                btnText.textContent = 'Predict Disease';
                submitBtn.disabled = false;
            }
        };

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
            fileName.textContent = file.name;
        }

        dropzone.addEventListener('click', () => imageInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                imageInput.files = e.dataTransfer.files;
                showPreview(e.dataTransfer.files[0]);
            }
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                showPreview(e.target.files[0]);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!imageInput.files || !imageInput.files[0]) return;

            const formData = new FormData(form);
            setLoading(true);
            resultBox.innerHTML = '<span class="muted">Predicting...</span>';
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.error) {
                    resultBox.innerHTML = `<span style="color:#ff9b9b">${result.error}</span>`;
                } else {
                    resultBox.innerHTML = `<div class="result-badge"><strong>Predicted:</strong> ${result.disease}</div>`;
                }
            } catch (err) {
                resultBox.innerHTML = `<span style="color:#ff9b9b">Something went wrong. Please try again.</span>`;
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
